services:
  db:
    image: postgres:16-alpine
    container_name: cash-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cash
      POSTGRES_PASSWORD: cash
      POSTGRES_DB: cash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cash -d cash"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: node:20-slim
    container_name: cash-app
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cash:cash@db:5432/cash?schema=public
      NEXTAUTH_SECRET: replace_with_strong_random_secret
      NEXTAUTH_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run db:push && npm run dev"

volumes:
  postgres_data:
